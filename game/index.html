function buildProfile(results){
  const correct=results.filter(r=>r.correct).length;
  const overconf=results.filter(r=>!r.correct&&r.confidence>=3).length;
  const underconf=results.filter(r=>r.correct&&r.confidence<=1).length;
  const iq=Math.min(100,Math.max(20,Math.round((correct/results.length)*100-overconf*8+underconf*3)+40));
  let archetype,description,blindspot;
  if(iq>=85){archetype="The Interrogator";description="You read people like open books. You catch micro-signals others miss entirely.";blindspot="You trust your gut so much you sometimes ignore contradicting evidence.";}
  else if(iq>=70){archetype="The Detective";description="Methodical and sharp. You look for inconsistencies before making a call.";blindspot="Emotional manipulation occasionally slips past your logic-first radar.";}
  else if(iq>=55){archetype="The Analyst";description="You notice patterns but hesitate to commit. Your instincts are good — trust them more.";blindspot="Overthinking under pressure leads you to second-guess correct first reads.";}
  else{archetype="The Empath";description="You want to believe people — which makes you unusually good at detecting real distress.";blindspot="Skilled liars who appeal to emotion consistently get past your defenses.";}
  return{iq,archetype,description,blindspot,correct,total:results.length};
}

const ALL_TYPES=["WHO_IS_LYING","AI_OR_HUMAN","BODY_LANGUAGE","CONSPIRACY_OR_FACT"];
async function generateAIScenario(roundNum,results=[],scenarios=[]){
  const stats={};ALL_TYPES.forEach(t=>{stats[t]={attempts:0,wrong:0};});
  results.forEach(r=>{const sc=scenarios[r.round];if(!sc)return;stats[sc.type].attempts++;if(!r.correct)stats[sc.type].wrong++;});
  const scored=ALL_TYPES.map(t=>{const s=stats[t];return{type:t,score:s.attempts>0?s.wrong/s.attempts:0,attempts:s.attempts};});
  const unexplored=scored.filter(s=>s.attempts===0),explored=scored.filter(s=>s.attempts>0).sort((a,b)=>b.score-a.score);
  const t=(explored.length>0&&(unexplored.length===0||Math.random()>0.3)?explored[0]:unexplored[Math.floor(Math.random()*unexplored.length)])?.type||ALL_TYPES[roundNum%4];
  const d=results.length<2?"medium":results.slice(-3).filter(r=>r.correct).length>=3?"hard":results.slice(-3).filter(r=>r.correct).length===0?"easy":"medium";
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1200,messages:[{role:"user",content:`Generate a DECEIVED game scenario. Type: ${t}. Difficulty: ${d}. Return ONLY valid JSON: {"id":${roundNum+10},"type":"${t}","difficulty":"${d}","title":"short title","setup":"2-3 sentence setup","statements":[{"name":"label","text":"statement"},{"name":"label","text":"statement"}],"clue":"psychological hint","liar":"exact answer label","explanation":"2-3 sentence reveal"}. BODY_LANGUAGE needs 3 observations and liar="She is hiding something". Make it psychologically rich.`}]})});
    const data=await res.json(),text=data.content?.find(b=>b.type==="text")?.text||"";
    return JSON.parse(text.replace(/```json|```/g,"").trim());

}

// ── MAIN APP ──────────────────────────────────────────────────
function App(){

  const[interactionCount,setInteractionCount]=useState(0);
  const[showNameEntry,setShowNameEntry]=useState(false);

  const[timeExpired,setTimeExpired]=useState(false);

  const[p2Results,setP2Results]=useState([]);
  const[waitingPass,setWaitingPass]=useState(false);
  const[chatOpen,setChatOpen]=useState(false);
  const[chatMessages,setChatMessages]=useState([]);
  const clockRef=useRef(null);
  const tensionTimerRef=useRef(null);
  const tensionValueRef=useRef(0);
  // Online state
  const[onlinePhase,setOnlinePhase]=useState("lobby");
  const[myOnlineName,setMyOnlineName]=useState("");
  const[opponentName,setOpponentName]=useState("");
  const[isHost,setIsHost]=useState(false);

  const[oppOnlineResults,setOppOnlineResults]=useState([]);
  const[opponentAnswered,setOpponentAnswered]=useState(false);
  const[opponentResult,setOpponentResult]=useState(null);
  const[onlineChat,setOnlineChat]=useState([]);
  const[myOnlineSubmission,setMyOnlineSubmission]=useState(null);
  const peerRef=useRef(null);

  const sound=useSoundEngine(soundOn);
  const scenario=scenarios[round];
  const totalRounds=scenarios.length;

  useEffect(()=>{if(screen==="game")sound.startAmbient();},[screen]);
  useEffect(()=>{
    if(screen!=="game"||submitted)return;
    if(tensionTimerRef.current)clearInterval(tensionTimerRef.current);
    tensionValueRef.current=0;setTensionState(0);sound.resetTension();
    tensionTimerRef.current=setInterval(()=>{tensionValueRef.current=Math.min(1,tensionValueRef.current+0.012);setTensionState(tensionValueRef.current);sound.setTension(tensionValueRef.current);},700);
    return()=>clearInterval(tensionTimerRef.current);
  },[round,screen,submitted]);
  useEffect(()=>{if(interactionCount===0)return;tensionValueRef.current=Math.min(1,tensionValueRef.current+0.07);setTensionState(tensionValueRef.current);sound.setTension(tensionValueRef.current);},[interactionCount]);
  useEffect(()=>{if(round>=3)generateAIScenario(round+1,results,scenarios).then(s=>{if(s)setScenarios(p=>[...p,s]);});},[round,submitted]);
  useEffect(()=>{
    if(!timedMode||screen!=="game"||submitted)return;
    if(clockRef.current)clearInterval(clockRef.current);
    const RT=30;setTimeLeft(RT);setTimeExpired(false);
    clockRef.current=setInterval(()=>setTimeLeft(prev=>{
      const next=prev-1;
      if(next<=10&&next>0)sound.playCountdownTick(next);
      const tp=1-(next/RT);tensionValueRef.current=Math.max(tensionValueRef.current,tp);setTensionState(tensionValueRef.current);sound.setTension(tensionValueRef.current);
      if(next<=0){clearInterval(clockRef.current);setTimeExpired(true);sound.playTimeUp();setResults(p=>[...p,{round,correct:false,confidence:0,selected:null,timedOut:true}]);setSubmitted(true);setStreak(0);setTimeout(()=>setRevealAnim(true),200);return 0;}
      return next;
    }),1000);
    return()=>clearInterval(clockRef.current);
  },[round,screen,timedMode,submitted]);

  function handleSelect(name){if(submitted)return;setSelected(name);setInteractionCount(c=>c+1);sound.playTick();}
  function handleConfChange(v){setConfidence(v);sound.playTick();setInteractionCount(c=>c+1);}
  function handleClue(){setShowClue(v=>!v);setInteractionCount(c=>c+1);sound.playTick();}

  function handleSubmit(){
    if(!selected)return;
    clearInterval(tensionTimerRef.current);if(timedMode)clearInterval(clockRef.current);
    sound.playLockIn();
    const correct=selected===scenario.liar;
    const result={round,correct,confidence,selected,timeLeft:timedMode?timeLeft:null};
    if(multiMode){currentPlayer===0?setP1Results(p=>[...p,result]):setP2Results(p=>[...p,result]);}
    else setResults(p=>[...p,result]);
    setSubmitted(true);
    if(correct){const ns=streak+1;setStreak(ns);if(timedMode){const spd=timeLeft>=20?20:timeLeft>=10?10:5,str=ns>=3?ns*5:0,tot=spd+str;if(tot>0){setBonusPoints(p=>p+tot);setShowBonus({text:ns>=3?`🔥 STREAK x${ns}  +${tot}pts`:`⚡ FAST  +${tot}pts`,color:ns>=3?C.red:C.teal});setTimeout(()=>setShowBonus(null),2000);}}}else setStreak(0);
    setTimeout(()=>{setRevealAnim(true);setTimeout(()=>sound.playReveal(correct),200);},100);
  }

  function handleNext(){
    setRevealAnim(false);setSubmitted(false);setSelected(null);setConfidence(2);setShowClue(false);setInteractionCount(0);setTimeExpired(false);setTimeLeft(30);
    if(multiMode){
      if(currentPlayer===0){setCurrentPlayer(1);setWaitingPass(true);return;}
      else{const done=p2Results.length+1;if(done>=totalRounds){setScreen("vsresults");return;}setCurrentPlayer(0);setWaitingPass(true);setRound(r=>r+1);return;}
    }
    if(round+1>=totalRounds){sound.stopAmbient();const p=buildProfile([...results]);setProfile(p);setScreen("profile");setTimeout(()=>{sound.playProfileReveal();setShowNameEntry(true);},400);}
    else setRound(r=>r+1);
  }

  function handleContinue(){setScreen("game");setRevealAnim(false);setSubmitted(false);setSelected(null);setConfidence(2);setShowClue(false);setInteractionCount(0);setRound(r=>r+1);sound.startAmbient();generateAIScenario(scenarios.length+1,results,scenarios).then(s=>{if(s)setScenarios(p=>[...p,s]);});}
  function handleNameSubmit(name){const e={name,diq:profile.iq,archetype:profile.archetype,correct:profile.correct,total:profile.total,date:Date.now()};saveToLeaderboard(e);setLastEntry(e);setShowNameEntry(false);sound.playLeaderboardEntry();}

  function restartSolo(){
    clearInterval(tensionTimerRef.current);clearInterval(clockRef.current);sound.stopAmbient();
    setScreen("intro");setRound(0);setSelected(null);setConfidence(2);setSubmitted(false);setResults([]);setShowClue(false);setProfile(null);setRevealAnim(false);setScenarios(STATIC_SCENARIOS);setTensionState(0);setInteractionCount(0);tensionValueRef.current=0;
    setShowNameEntry(false);setLastEntry(null);setShowShareCard(false);setStreak(0);setBonusPoints(0);setShowBonus(null);setTimeLeft(30);setTimeExpired(false);
    setCurrentPlayer(0);setP1Results([]);setP2Results([]);setWaitingPass(false);setChatMessages([]);setChatOpen(false);
  }

  // Online
  const handleOnlineData=useCallback((data)=>{
    if(data.type==="hello")setOpponentName(data.name);
    if(data.type==="start")setOnlinePhase("playing");
    if(data.type==="answer"){setOpponentAnswered(true);setOppOnlineResults(p=>[...p,data.result]);setOpponentResult(data.result);}
    if(data.type==="next_round"){setOpponentAnswered(false);setOpponentResult(null);setMyOnlineSubmission(null);}
    if(data.type==="chat")setOnlineChat(p=>[...p,data.msg]);
  },[]);
  function onlineSend(data){try{connRef.current?.send(data);}catch{}}
  async function hostGame(name){
    setMyOnlineName(name);setIsHost(true);const code=makeCode();setRoomCode(code);setOnlinePhase("waiting");
    const peer=new window.Peer("deceived-"+code,{host:"0.peerjs.com",port:443,secure:true,path:"/"});peerRef.current=peer;
    peer.on("error",e=>{setOnlineError("Room error: "+e.message);setOnlinePhase("error");});
    peer.on("connection",conn=>{connRef.current=conn;conn.on("open",()=>conn.send({type:"hello",name}));conn.on("data",handleOnlineData);});
  }
  async function joinGame(name,code){
    setMyOnlineName(name);setIsHost(false);setRoomCode(code);setOnlinePhase("waiting");
    const peer=new window.Peer({host:"0.peerjs.com",port:443,secure:true,path:"/"});peerRef.current=peer;
    peer.on("error",e=>{setOnlineError("Could not connect: "+e.message);setOnlinePhase("error");});

      const conn=peer.connect("deceived-"+code,{reliable:true});connRef.current=conn;

      conn.on("data",(data)=>{handleOnlineData(data);if(data.type==="hello"){setTimeout(()=>{conn.send({type:"start"});setOnlinePhase("playing");},800);}});
      conn.on("error",e=>{setOnlineError("Connection error: "+e.message);setOnlinePhase("error");});
    });
  }
  useEffect(()=>{if(isHost&&opponentName&&onlinePhase==="waiting"){const t=setTimeout(()=>setOnlinePhase("playing"),1200);return()=>clearTimeout(t);}},[opponentName,isHost,onlinePhase]);
  function handleOnlineSubmit(result){setMyOnlineSubmission(result);setMyOnlineResults(p=>[...p,result]);onlineSend({type:"answer",result});}
  function handleOnlineNext(){const next=onlineRound+1;if(next>=ONLINE_ROUNDS){setOnlinePhase("finished");return;}setOnlineRound(next);setOpponentAnswered(false);setOpponentResult(null);setMyOnlineSubmission(null);onlineSend({type:"next_round",round:next});}

  const oppOnlineColor=isHost?P_COLORS[1]:P_COLORS[0];

  // ── HOME ──────────────────────────────────────────────────
  if(appMode==="home") return e("div",{style:{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px 20px",fontFamily:"Inter,sans-serif"}},
    e("div",{style:{maxWidth:520,width:"100%",textAlign:"center"}},
      e("div",{style:{fontSize:11,letterSpacing:6,color:C.teal,fontWeight:700,marginBottom:16}},"SOCIAL INTELLIGENCE GAME"),
      e("h1",{style:{fontFamily:"'Bebas Neue',Impact,sans-serif",fontSize:"clamp(72px,16vw,120px)",color:C.white,margin:0,lineHeight:0.9,letterSpacing:2}},"DECEIVED"),
      e("div",{style:{width:60,height:3,background:C.amber,margin:"22px auto"}}),
      e("p",{style:{color:C.muted,fontSize:15,lineHeight:1.7,marginBottom:32}},
        "Lies. Body language. AI impostors. Buried truth.",e("br"),
        "Can you tell who's deceiving — and how confident are you?",e("br"),e("br"),
        e("strong",{style:{color:C.white}},"Scored on accuracy AND confidence.")),
      e("div",{style:{display:"flex",justifyContent:"center",alignItems:"center",gap:12,marginBottom:8}},
        e(PulseBar,{confidence:2,active:true}),
        e(SoundToggle,{on:soundOn,onToggle:()=>setSoundOn(v=>!v)})),
      e("div",{style:{fontSize:11,color:C.muted,letterSpacing:1,marginBottom:28}},`LIE DETECTOR CALIBRATING · SOUND ${soundOn?"ON":"OFF"}`),
      e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}},
        ...[
          {icon:"▶",name:"CLASSIC",desc:"Pure deduction · No timer",bg:C.amber,color:C.bg,action:()=>{setMultiMode(false);setTimedMode(false);setAppMode("solo");}},
          {icon:"⏱",name:"TIMED",desc:"30s · Speed bonuses · Streaks",bg:C.red,color:C.white,action:()=>{setMultiMode(false);setTimedMode(true);setAppMode("solo");}},

          e("div",{style:{fontSize:24,marginBottom:8}},m.icon),

function OnlineRound({scenario,round,totalRounds,myName,opponentName,myColor,oppColor,onSubmit,opponentAnswered,opponentCorrect,myResult,chatMessages,onChat,onNextRound}){
  const[selected,setSelected]=useState(null);const[confidence,setConfidence]=useState(2);const[submitted,setSubmitted]=useState(false);

  const[unread,setUnread]=useState(false);const[revealAnim,setRevealAnim]=useState(false);const[timeLeft,setTimeLeft]=useState(30);

          e("div",{style:{fontSize:10,color:"#6B7280",marginBottom:3}},m.sender),
          e("div",{style:{background:`${color}20`,border:`1px solid ${color}50`,borderRadius:isMe?"12px 12px 3px 12px":"12px 12px 12px 3px",padding:"10px 14px",maxWidth:"80%",color:"#F0F2F8",fontSize:14}},m.text));})),
      e("div",{style:{background:"#11141E",padding:"12px 16px",borderTop:"1px solid #1E2235"}},
        e("div",{style:{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}},TRASH.map((t,i)=>e("button",{key:i,onClick:()=>sendChat(t),style:{background:"none",border:"1px solid #1E2235",borderRadius:20,color:"#6B7280",fontSize:11,padding:"5px 10px",cursor:"pointer"}},t))),
        e("div",{style:{display:"flex",gap:8}},
          e("input",{value:chatInput,onChange:ev=>setChatInput(ev.target.value),onKeyDown:ev=>ev.key==="Enter"&&sendChat(chatInput),placeholder:"Type...",style:{flex:1,background:"#0A0C12",border:"1.5px solid #1E2235",borderRadius:8,color:"#F0F2F8",fontSize:14,padding:"10px 14px",outline:"none",fontFamily:"Inter,sans-serif"}}),
          e("button",{onClick:()=>sendChat(chatInput),style:{background:myColor,color:"#0A0C12",border:"none",borderRadius:8,padding:"10px 18px",fontWeight:800,fontSize:14,cursor:"pointer"}},"SEND")))),
    e("div",{style:{padding:"20px 20px 0",maxWidth:620,margin:"0 auto"}},
      e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}},

          e("button",{onClick:()=>{setChatOpen(true);setUnread(false);},style:{position:"relative",background:"none",border:`1px solid ${unread?"#7C3AED":"#1E2235"}`,borderRadius:6,color:unread?"#7C3AED":"#6B7280",fontSize:16,cursor:"pointer",padding:"5px 10px"}},"💬",unread&&e("span",{style:{position:"absolute",top:-3,right:-3,width:8,height:8,background:"#7C3AED",borderRadius:"50%"}})),
          e("div",{style:{fontSize:12,color:"#6B7280"}},`R${round+1}/${totalRounds}`))),
      !submitted&&e("div",{style:{height:3,background:"#1E2235",borderRadius:2,marginBottom:10,overflow:"hidden"}},e("div",{style:{height:"100%",width:`${(timeLeft/30)*100}%`,background:timeLeft<=5?"#E83050":timeLeft<=10?"#E8A030":"#00D4AA",borderRadius:2,transition:"width 1s linear"}})),
      e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}},
        ...[{name:myName,color:myColor,answered:submitted,label:"YOU"},{name:opponentName,color:oppColor,answered:opponentAnswered,label:"OPPONENT"}].map((p,i)=>
          e("div",{key:i,style:{background:"#11141E",border:`1px solid ${p.answered?p.color+"60":"#1E2235"}`,borderRadius:8,padding:"10px 14px",transition:"border-color 0.3s"}},

            e("div",{style:{color:"#F0F2F8",fontSize:13,fontWeight:600,marginBottom:3}},p.name),

          e("div",{style:{color:"#F0F2F8",fontSize:13,lineHeight:1.6}},`"${s.text}"`));})),
      !submitted&&e("button",{onClick:()=>setShowClue(v=>!v),style:{background:"none",border:"1px solid #1E2235",borderRadius:6,padding:"10px 16px",color:"#6B7280",fontSize:13,cursor:"pointer",width:"100%",marginBottom:10}},showClue?"▲ Hide clue":"🔍 Reveal psychological clue (free)"),
      showClue&&e("div",{style:{background:"rgba(0,212,170,0.12)",border:"1px solid rgba(0,212,170,0.4)",borderRadius:6,padding:"12px 16px",marginBottom:10}},
        e("div",{style:{fontSize:10,letterSpacing:2,color:"#00D4AA",marginBottom:4,fontWeight:700}},"BEHAVIORAL INSIGHT"),
        e("div",{style:{color:"#F0F2F8",fontSize:13,lineHeight:1.6}},scenario.clue)),

        e("div",{style:{textAlign:"center",color:myColor,fontWeight:700,fontSize:14,marginTop:6}},CONFIDENCE_LABELS[confidence])),

function OnlineFinalScore({myName,opponentName,myScore,oppScore,myColor,oppColor,totalRounds,onPlayAgain}){
  const winner=myScore>oppScore?"me":oppScore>myScore?"opp":"draw";const wc=winner==="me"?myColor:winner==="opp"?oppColor:"#E8A030";
  const e=React.createElement;
  return e("div",{style:{minHeight:"100vh",background:"#0A0C12",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px 20px",fontFamily:"Inter,sans-serif"}},
    e("div",{style:{maxWidth:480,width:"100%",textAlign:"center"}},
      e("div",{style:{fontSize:11,letterSpacing:6,color:"#6B7280",fontWeight:700,marginBottom:20}},"FINAL VERDICT · ONLINE"),
      e("div",{style:{background:`${wc}15`,border:`2px solid ${wc}`,borderRadius:12,padding:"28px",marginBottom:24}},
        winner==="draw"
          ? e("div",{style:{fontFamily:"'Bebas Neue',Impact,sans-serif",fontSize:52,color:"#E8A030",letterSpacing:2}},"DRAW")
          : [e("div",{key:"l",style:{fontSize:11,letterSpacing:4,color:wc,fontWeight:700,marginBottom:8}},"WINNER"),
             e("div",{key:"n",style:{fontFamily:"'Bebas Neue',Impact,sans-serif",fontSize:52,color:wc,letterSpacing:2}},winner==="me"?myName:opponentName),
             e("div",{key:"s",style:{color:"#6B7280",fontSize:14,marginTop:8}},winner==="me"?`${opponentName} got played. 🕵️`:"You got played. 🕵️")]),
      e("div",{style:{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:12,alignItems:"center",marginBottom:24}},
        ...[{n:myName,s:myScore,c:myColor,w:winner==="me"},{n:opponentName,s:oppScore,c:oppColor,w:winner==="opp"}].map((p,i)=>
          e("div",{key:i,style:{background:"#161A28",border:`2px solid ${p.w?p.c:"#1E2235"}`,borderRadius:10,padding:"20px 12px",textAlign:"center"}},
            e("div",{style:{fontSize:10,letterSpacing:2,color:p.c,fontWeight:700,marginBottom:6}},i===0?"YOU":"OPPONENT"),
            e("div",{style:{color:"#F0F2F8",fontSize:13,fontWeight:700,marginBottom:10}},p.n),
            e("div",{style:{fontFamily:"'Bebas Neue',Impact,sans-serif",fontSize:52,color:p.c,lineHeight:1}},p.s),
            e("div",{style:{fontSize:11,color:"#6B7280"}},`/ ${totalRounds}`))),
        e("div",{key:"vs",style:{fontFamily:"'Bebas Neue',Impact,sans-serif",fontSize:28,color:"#6B7280"}},"VS")),
      e("button",{onClick:onPlayAgain,style:{background:"#E8A030",color:"#0A0C12",border:"none",borderRadius:6,padding:"14px 48px",fontSize:15,fontWeight:800,letterSpacing:2,cursor:"pointer",fontFamily:"'Bebas Neue',Impact,sans-serif",width:"100%"}},"PLAY AGAIN")));
}
